<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>STM32 Ohjeet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100dvh;
      overflow: hidden;
      background: #f0f0f0;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    #sidebar h1 {
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: #cba6f7;
      flex: 1;
    }

    #menu { overflow-y: auto; flex: 1; }

    .category { border-bottom: 1px solid #313244; }

    .category-header {
      padding: 11px 16px;
      font-size: 0.78rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a6adc8;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .category-header:hover { background: #2a2a3e; }
    .category-header .arrow { transition: transform 0.2s; font-size: 0.7rem; }
    .category-header.open .arrow { transform: rotate(90deg); }

    .subcategory-list { display: none; }
    .subcategory-list.open { display: block; }

    .subcategory-header {
      padding: 9px 16px 9px 28px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #bac2de;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .subcategory-header:hover { background: #2a2a3e; }
    .subcategory-header .arrow { transition: transform 0.2s; font-size: 0.65rem; }
    .subcategory-header.open .arrow { transform: rotate(90deg); }

    .pdf-list { display: none; }
    .pdf-list.open { display: block; }

    .pdf-link {
      display: block;
      padding: 8px 16px 8px 42px;
      font-size: 0.82rem;
      color: #89b4fa;
      cursor: pointer;
      border-left: 3px solid transparent;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pdf-link:hover { background: #313244; color: #cdd6f4; }
    .pdf-link.active {
      background: #313244;
      border-left-color: #cba6f7;
      color: #cdd6f4;
    }

    /* ── Viewer ── */
    #viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 0;
    }

    #viewer iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }

    #placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      gap: 12px;
    }
    #placeholder .icon { font-size: 3rem; }
    #placeholder p { font-size: 1.1rem; }

    /* ── Toggle button (mobile only, inside sidebar header) ── */
    #toggleBtn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid #313244;
      color: #cba6f7;
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      flex-shrink: 0;
    }
    #toggleBtn:hover { background: #2a2a3e; }

    /* ── Open button (mobile, shown on viewer when sidebar is closed) ── */
    #openBtn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #1e1e2e;
      border: 1px solid #313244;
      color: #cba6f7;
      font-size: 1.2rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    #openBtn:hover { background: #2a2a3e; }
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    /* ── Mobile styles ── */
    @media (max-width: 700px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
      }
      #sidebar.open {
        transform: translateX(0);
      }
      #toggleBtn {
        display: flex;
      }
      #openBtn {
        display: flex;
      }
      #sidebar.open ~ * #openBtn,
      body.sidebar-open #openBtn {
        display: none;
      }
      #overlay.visible {
        display: block;
      }
      #viewer {
        width: 100%;
      }
      #placeholder p {
        font-size: 0.95rem;
        text-align: center;
        padding: 0 1rem;
      }
    }
  </style>
</head>
<body>

<!-- Mobile overlay -->
<div id="overlay"></div>

<!-- Open button (shown on viewer when sidebar is hidden on mobile) -->
<button id="openBtn" aria-label="Open menu">☰</button>

<nav id="sidebar">
  <div id="sidebar-header">
    <button id="toggleBtn" aria-label="Toggle menu">✕</button>
    <h1>📘 STM32 Ohjeet</h1>
  </div>
  <div id="menu"></div>
</nav>

<main id="viewer">
  <div id="placeholder">
    <div class="icon">📄</div>
    <p>Valitse ohje vasemmalta valikosta</p>
  </div>
  <iframe id="pdfFrame" style="display:none"></iframe>
</main>

<script>
  // ─────────────────────────────────────────────
  // EDIT THIS: Add your categories, subcategories
  // and PDF files here.
  // ─────────────────────────────────────────────
  const manuals = {
    "Näytöt": {
      "SSD1306 / SSD1315": [
        { name: "SSD1306 Ohje", file: "Näytöt/ssd1306-ssd1315/ssd1306_ohje.pdf" }
      ]
    },
    // "Anturit": {
    //   "Lämpötila": [
    //     { name: "DS18B20 Ohje", file: "Anturit/lämpötila/ds18b20_ohje.pdf" }
    //   ]
    // }
  };
  // ─────────────────────────────────────────────

  const menu       = document.getElementById("menu");
  const frame      = document.getElementById("pdfFrame");
  const placeholder= document.getElementById("placeholder");
  const sidebar    = document.getElementById("sidebar");
  const overlay    = document.getElementById("overlay");
  const toggleBtn  = document.getElementById("toggleBtn");
  const openBtn    = document.getElementById("openBtn");

  const isMobile = () => window.innerWidth <= 700;

  function openSidebar() {
    sidebar.classList.add("open");
    overlay.classList.add("visible");
    document.body.classList.add("sidebar-open");
    openBtn.style.display = "none";
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    overlay.classList.remove("visible");
    document.body.classList.remove("sidebar-open");
    if (isMobile()) openBtn.style.display = "flex";
  }

  toggleBtn.addEventListener("click", closeSidebar);
  openBtn.addEventListener("click", openSidebar);
  overlay.addEventListener("click", closeSidebar);

  function openPdf(filePath, linkEl) {
    document.querySelectorAll(".pdf-link").forEach(el => el.classList.remove("active"));
    linkEl.classList.add("active");
    placeholder.style.display = "none";
    frame.style.display = "block";
    frame.src = filePath;
    if (isMobile()) closeSidebar();
  }

  function toggleOpen(headerEl, listEl) {
    const isOpen = listEl.classList.toggle("open");
    headerEl.classList.toggle("open", isOpen);
  }

  Object.entries(manuals).forEach(([catName, subcats]) => {
    const catDiv = document.createElement("div");
    catDiv.className = "category";

    const catHeader = document.createElement("div");
    catHeader.className = "category-header";
    catHeader.innerHTML = `<span>${catName}</span><span class="arrow">▶</span>`;

    const subcatList = document.createElement("div");
    subcatList.className = "subcategory-list";

    catHeader.addEventListener("click", () => toggleOpen(catHeader, subcatList));

    Object.entries(subcats).forEach(([subcatName, pdfs]) => {
      const subcatHeader = document.createElement("div");
      subcatHeader.className = "subcategory-header";
      subcatHeader.innerHTML = `<span>${subcatName}</span><span class="arrow">▶</span>`;

      const pdfList = document.createElement("div");
      pdfList.className = "pdf-list";

      subcatHeader.addEventListener("click", () => toggleOpen(subcatHeader, pdfList));

      pdfs.forEach(pdf => {
        const link = document.createElement("a");
        link.className = "pdf-link";
        link.textContent = pdf.name;
        link.href = "#";
        link.title = pdf.name;
        link.addEventListener("click", e => {
          e.preventDefault();
          openPdf(pdf.file, link);
          subcatList.classList.add("open");
          catHeader.classList.add("open");
          pdfList.classList.add("open");
          subcatHeader.classList.add("open");
        });
        pdfList.appendChild(link);
      });

      subcatList.appendChild(subcatHeader);
      subcatList.appendChild(pdfList);
    });

    catDiv.appendChild(catHeader);
    catDiv.appendChild(subcatList);
    menu.appendChild(catDiv);
  });
</script>

</body>
</html>
